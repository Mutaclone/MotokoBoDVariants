<!DOCTYPE html>
<html>
<head>
    <title>BoD Nightfury Uploader</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; display: flex; justify-content: center; padding: 40px; }
        .box { background: #161b22; border: 1px solid #30363d; padding: 25px; border-radius: 10px; width: 350px; }
        input { width: 100%; margin: 10px 0; padding: 8px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #238636; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2ea043; }
        button:disabled { background: #215732; cursor: not-allowed; opacity: 0.6; }
        .info { font-size: 12px; color: #8b949e; margin-top: 15px; white-space: pre-wrap; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Nightfury Variant Portal</h3>
        <p style="font-size: 0.8em; color: #8b949e;">Upload PNG variants to the repository.</p>
        
        <input type="number" id="vNum" placeholder="Variant Number (e.g. 5)">
        <input type="file" id="vFile" accept="image/png">
        <button id="uploadBtn" onclick="sendDispatch()">Upload to Library</button>
        
        <div id="status" class="info"></div>
    </div>

    <script>
        // Insert your GitHub Fine-Grained Personal Access Token here
        const GITHUB_TOKEN = "github_pat_YOUR_ACTUAL_TOKEN_HERE";

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        async function sendDispatch() {
            const num = document.getElementById('vNum').value.trim();
            const file = document.getElementById('vFile').files[0];
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            // 1. Pre-flight Checks
            if (!num || !file) return alert("Please select a file and a variant number.");
            
            if (GITHUB_TOKEN.includes("YOUR_ACTUAL_TOKEN")) {
                status.innerText = "❌ Configuration Error:\nYou must replace the placeholder token in the script with your real GitHub PAT.";
                return;
            }

            try {
                btn.disabled = true;
                status.innerText = "⏳ Processing image...";
                
                const base64Data = await toBase64(file);
                
                status.innerText = "📡 Dispatching to GitHub Actions...";
                
                const response = await fetch("https://api.github.com/repos/Mutaclone/MotokoBoDVariants/dispatches", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GITHUB_TOKEN}`, 
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "upload_variant",
                        client_payload: { 
                            variant: num.toString(), 
                            file_data: base64Data 
                        }
                    })
                });

                if (response.ok || response.status === 204) {
                    status.innerText = "✅ Success!\nVariant #" + num + " has been queued for upload.";
                    document.getElementById('vNum').value = "";
                    document.getElementById('vFile').value = "";
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    status.innerText = "❌ GitHub API Error (" + response.status + "):\n" + (errorData.message || "Unauthorized / Bad Credentials");
                }
            } catch (err) {
                status.innerText = "❌ Network Error:\n" + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
